<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Maximize Human Performace" />
    <title>Vasana ai</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="download-card" aria-labelledby="app-title">
        <img
          class="app-icon"
          src="assets/app_icon.png"
          alt="App icon"
          width="144"
          height="144"
        />
        <h1 id="app-title">Vasana ai</h1>
        <p class="subtitle">Maximize Human Performace</p>

        <div class="store-links" aria-label="Download links">
          <a
            id="play-store-link"
            class="store-button play-store"
            href="#"
            target="_blank"
            rel="noreferrer"
          >
            <span class="store-kicker">GET IT ON</span>
            <span class="store-name">Google Play</span>
          </a>

          <a
            id="app-store-link"
            class="store-button app-store"
            href="#"
            target="_blank"
            rel="noreferrer"
          >
            <span class="store-kicker">Download on the</span>
            <span class="store-name">App Store</span>
          </a>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
